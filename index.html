<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento de Produtos e Serviços</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="orcamento">
    <h2>Orçamento de Produtos e Serviços</h2>

    <div class="dados-cliente">
      <label>Cliente: <input type="text" id="cliente" /></label><br />
      <label>Endereço: <input type="text" id="endereco" /></label><br />
      <label>Telefone: <input type="text" id="telefone" /></label><br />
      <label>Data: <input type="date" id="data" /></label>
    </div>

    <table id="tabela">
      <thead>
        <tr>
          <th>Quantidade</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Valor Total</th>
        </tr>
      </thead>
      <tbody id="itens">
        <tr>
          <td><input type="number" value="1" class="qtd" /></td>
          <td><input type="text" class="desc" placeholder="Descrição" /></td>
          <td><input type="number" class="valor" step="0.01" /></td>
          <td class="total">R$ 0,00</td>
        </tr>
      </tbody>
    </table>

    <button id="addItem">+ Adicionar Item</button>

    <h3>Total Geral: <span id="totalGeral">R$ 0,00</span></h3>
  </div>

  <div class="acoes">
    <button id="gerarPDF">📄 Gerar PDF</button>
    <button id="gerarIMG">🖼️ Gerar Imagem</button>
    <button id="limpar">🧹 Limpar Dados</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>

<footer style="
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 0;
  ">
    <img src="minha-logo.png" alt="Logo" width="24" height="24">
    <span>© 2025 Rogério Estumano</span>
  </footer>

</body>
</html>
